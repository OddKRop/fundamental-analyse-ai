name: Quarterly analysis refresh

on:
  schedule:
    - cron: '0 6 1 1,4,7,10 *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Refresh all tickers one by one
        run: |
          TICKERS=(
            "EQNR.OL" "DNB.OL" "TEL.OL" "AKRBP.OL" "NHY.OL"
            "MOWI.OL" "YAR.OL" "ORK.OL" "SALM.OL" "KOG.OL"
            "STB.OL" "GJF.OL" "SUBC.OL" "SCATC.OL" "NEL.OL"
            "BOUV.OL" "PGS.OL" "TGS.OL" "FRO.OL" "BWO.OL"
            "AUTO.OL" "NSKOG.OL" "RECSI.OL"
          )

          for TICKER in "${TICKERS[@]}"; do
            echo "--- Refreshing $TICKER ---"
            curl -f -L -X POST "${{ secrets.APP_URL }}/api/admin/refresh?ticker=$TICKER&secret=${{ secrets.CRON_SECRET }}" || echo "FAILED: $TICKER"
            echo ""
            sleep 5
          done
